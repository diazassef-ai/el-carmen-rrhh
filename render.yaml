services:
  - type: web
    name: el-carmen-rrhh
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /login/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: el-carmen-rrhh-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_PRODUCTION
        value: "1"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: PYTHON_VERSION
        value: "3.14.3"

databases:
  - name: el-carmen-rrhh-db
    plan: free
    databaseName: el_carmen_rrhh
    user: el_carmen_rrhh
