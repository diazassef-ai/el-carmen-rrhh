services:
  - type: web
    name: el-carmen-rrhh
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py crear_admin_inicial && python manage.py crear_usuario_clinicas && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /login/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_PRODUCTION
        value: "1"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: PYTHON_VERSION
        value: "3.14.3"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_CLINICAS_USERNAME
        value: clinicas
      - key: DJANGO_CLINICAS_EMAIL
        sync: false
      - key: DJANGO_CLINICAS_PASSWORD
        sync: false
      - key: DJANGO_CLINICAS_REPORT_EMAILS
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
