{% extends "rrhh/base.html" %}
{% block page_title %}Anular solicitud{% endblock %}
{% block content %}
<div class="panel-card p-4">
  <h2 class="h5">Confirmar anulacion</h2>
  <p class="text-muted">La solicitud de {{ solicitud.funcionario.nombre_completo }} quedara marcada como Anulado.</p>
  <form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <button class="btn btn-danger">Anular solicitud</button>
    <a href="{% url 'rrhh_solicitud_detalle' solicitud.pk %}" class="btn btn-outline-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
