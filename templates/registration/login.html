{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - El Carmen RRHH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      align-items: center;
      background: #f5f7fb;
      display: flex;
      min-height: 100vh;
    }
    .login-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, .08);
      margin: auto;
      max-width: 420px;
      padding: 28px;
      width: 100%;
    }
    .brand {
      color: #134e4a;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="text-center mb-4">
      <img src="{% static 'img/logo_cesfam_el_carmen.png' %}" onerror="this.src='{% static 'img/logo_cesfam.png' %}'" alt="CESFAM El Carmen" style="height:64px;width:64px;object-fit:contain">
      <h1 class="brand h3 mt-2 mb-1">EL CARMEN RRHH</h1>
      <p class="text-muted mb-0">Sistema de Gestion de Permisos, Capacitaciones y Ausentismo</p>
    </div>
    {% if form.errors %}
      <div class="alert alert-danger">Usuario o contrasena incorrectos.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label" for="{{ form.username.id_for_label }}">Usuario</label>
        <input class="form-control" type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="{{ form.password.id_for_label }}">Contrasena</label>
        <input class="form-control" type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" required>
      </div>
      <button class="btn w-100 text-white" style="background:#0f766e">Ingresar</button>
    </form>
  </main>
  <script>
    localStorage.removeItem("elCarmenRrhh:logoutAt");
    localStorage.setItem("elCarmenRrhh:lastActivity", String(Date.now()));
  </script>
</body>
</html>
